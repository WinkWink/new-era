<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown to Spring 2026</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      /* mobile-safe viewport height */
      min-height: 100vh;
      min-height: 100dvh;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 24px; /* prevents edge-to-edge squish */
      background: linear-gradient(135deg, #fcefee, #e8f5e9);
    }

    .container {
      width: 100%;
      max-width: 720px;
      text-align: center;
      padding: clamp(16px, 4vw, 32px);
    }

    h1 {
      margin-bottom: clamp(16px, 4vw, 28px);
      font-weight: 650;
      font-size: clamp(1rem, 4.5vw, 2rem);
      color: #3a5a40;
      line-height: 1.15;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .time-box {
      background: white;
      padding: 18px 16px;
      border-radius: 16px;
      min-width: 120px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease;
    }

    .time-box:hover {
      transform: translateY(-4px);
    }

    .time-box span {
      display: block;
      font-size: clamp(1.9rem, 6vw, 2.6rem);
      font-weight: 750;
      color: #588157;
      line-height: 1;
    }

    .time-box label {
      display: block;
      margin-top: 10px;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #6c757d;
    }

    .spring-message {
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: #3a5a40;
      font-weight: 650;
    }

    /* Mobile layout: clean 2x2 grid */
    @media (max-width: 520px) {
      body {
        padding: 16px;
      }

      .countdown {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        max-width: 420px;
        margin: 0 auto;
      }

      .time-box {
        min-width: 0;            /* allow grid to control width */
        padding: 14px 12px;
        border-radius: 14px;
      }

      .time-box label {
        margin-top: 8px;
        font-size: 0.72rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🌷 Countdown to Spring 2026 🌷</h1>

    <div class="countdown" id="countdown">
      <div class="time-box">
        <span id="days">00</span>
        <label>Days</label>
      </div>
      <div class="time-box">
        <span id="hours">00</span>
        <label>Hours</label>
      </div>
      <div class="time-box">
        <span id="minutes">00</span>
        <label>Minutes</label>
      </div>
      <div class="time-box">
        <span id="seconds">00</span>
        <label>Seconds</label>
      </div>
    </div>
  </div>

  <script>
    const springDate = new Date("March 20, 2026 00:00:00").getTime();
    const countdownEl = document.getElementById("countdown");

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function updateCountdown() {
      const now = Date.now();
      const distance = springDate - now;

      if (distance <= 0) {
        countdownEl.innerHTML = '<div class="spring-message">🌸 Spring is here! 🌸</div>';
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").textContent = days;      // days can be big
      document.getElementById("hours").textContent = pad2(hours);
      document.getElementById("minutes").textContent = pad2(minutes);
      document.getElementById("seconds").textContent = pad2(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
